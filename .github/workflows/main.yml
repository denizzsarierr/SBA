name: SBA Math Formulas Check
on: [push]
jobs:
  run-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Copy code to the virtual machine.
        env:
          PYTHONPATH: ${{ github.workspace }}
      - name: Setup Python
        uses: actions/setup-python@v4 # Install python enviroment.
        with:
          python-version: '3.11'
      - name: Install Deps
        run: python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests
        run: python test_logic.py # Running our test script.
